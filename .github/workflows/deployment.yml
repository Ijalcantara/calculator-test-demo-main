name: Deployment on Staging + Production (GitHub Pages)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write
  statuses: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:

  # =========================
  # 1. PACKAGE SITE
  # =========================
  package_site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug workspace
        run: ls -R .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs   # IMPORTANT: must contain index.html


  # =========================
  # 2. STAGING DEPLOY
  # =========================
  deploy_staging:
    needs: package_site
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Deploy to GitHub Pages (Staging)
        uses: actions/deploy-pages@v4


  # =========================
  # 3. SMOKE TEST (REST ASSURED)
  # =========================
  smoke_test_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest

    steps:
      - name: Trigger REST Assured tests
        id: dispatch
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: "Ijalcantara"
          TARGET_REPO: "final-rest-assured-framework"
          STAGING_URL: "https://ijalcantara.github.io/calculator-test-demo-main/"
        with:
          github-token: ${{ secrets.CICD_TOKEN }}
          script: |
            const payload = {
              base_url: process.env.STAGING_URL,
              environment: "staging",
              mode: "smoke",
              source_repo: `${context.repo.owner}/${context.repo.repo}`,
              sha: context.sha,
              ref: context.ref.replace("refs/heads/", "")
            };

            await github.rest.repos.createDispatchEvent({
              owner: process.env.TARGET_OWNER,
              repo: process.env.TARGET_REPO,
              event_type: "run-tests",
              client_payload: payload
            });

            core.setOutput("dispatched_at", new Date().toISOString());


      # =========================
      # FIXED WAIT LOGIC (NO 404)
      # =========================

      - name: Wait for smoke tests
        id: wait
        uses: actions/github-script@v7
        env:
          TARGET_OWNER: "Ijalcantara"
          TARGET_REPO: "final-rest-assured-framework"
          DISPATCHED_AT: ${{ steps.dispatch.outputs.dispatched_at }}
        with:
          github-token: ${{ secrets.CICD_TOKEN }}
          script: |
            const { TARGET_OWNER, TARGET_REPO, DISPATCHED_AT } = process.env;

            const timeout = Date.now() + 20 * 60 * 1000;
            const dispatchedAtMs = Date.parse(DISPATCHED_AT);

            let runId = null;
            let run = null;

            while (Date.now() < timeout) {

              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                event: "repository_dispatch",
                per_page: 20
              });

              const match = runs.data.workflow_runs.find(
                r => Date.parse(r.created_at) >= dispatchedAtMs
              );

              if (match) {
                runId = match.id;
                break;
              }

              await new Promise(r => setTimeout(r, 5000));
            }

            if (!runId) {
              core.setFailed("REST Assured run not found");
              return;
            }

            while (Date.now() < timeout) {
              const res = await github.rest.actions.getWorkflowRun({
                owner: TARGET_OWNER,
                repo: TARGET_REPO,
                run_id: runId
              });

              run = res.data;

              if (run.status === "completed") break;

              await new Promise(r => setTimeout(r, 10000));
            }

            core.setOutput("run_url", run.html_url);
            core.setOutput("conclusion", run.conclusion || "unknown");

            if (run.conclusion !== "success") {
              core.setFailed(`Smoke tests failed: ${run.conclusion}`);
            }
  

  # =========================
  # 4. PRODUCTION DEPLOY
  # =========================
  deploy_production:
    needs: [package_site, deploy_staging, smoke_test_staging]
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Deploy to GitHub Pages (Production)
        uses: actions/deploy-pages@v4
